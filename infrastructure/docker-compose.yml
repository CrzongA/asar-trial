version: '3.8'

services:
  vllm:
    image: rocm/vllm-rocm:latest
    container_name: asar_vllm
    devices:
      - /dev/kfd
      - /dev/dri
    environment:
      - ROCM_VERSION=6.0
    ports:
      - "8000:8000"
    command: >
      --model Qwen/Qwen3-VL-235B-A22B-Instruct-FP8
      --tensor-parallel-size 8
      --gpu-memory-utilization 0.95
      --trust-remote-code
    shm_size: '32gb'
    ipc: host
    network_mode: "host"

  micro_xrce_dds:
    image: microros/micro-ros-agent:jazzy
    container_name: micro_xrce_dds_agent
    network_mode: "host"
    command: udp4 --port 8888 -v6
